spring.application.name=taller
server.port=8088


spring.datasource.url=jdbc:mysql://localhost:3306/talleram_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# URL de ms-especialidades. AppConfig la inyecta con @Value.
# Si el otro servicio cambia de host/puerto, solo cambiar aquí.
empleado.url=http://localhost:8084


springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html